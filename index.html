<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MIXR - AI Cocktail Recipe Generator</title>
    <meta
      name="description"
      content="Discover and create cocktail recipes with AI-powered mixology. Generate unique drink recipes, browse community cocktails, and master the art of mixing."
    />
    <meta
      name="keywords"
      content="cocktail recipes, AI bartender, drink maker, recipe generator, mixology"
    />
    <meta name="author" content="{{VITE_COMPANY_NAME}}" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#e11d48" />

    <!-- Application Meta -->
    <meta name="application-name" content="MIXR" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MIXR" />
    <meta name="copyright" content="{{VITE_COMPANY_NAME}}. All rights reserved." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="MIXR - AI Cocktail Recipe Generator" />
    <meta
      property="og:description"
      content="Discover and create cocktail recipes with AI-powered mixology. Generate unique drink recipes, browse community cocktails, and master the art of mixing."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://{{VITE_APP_DOMAIN}}/" />
    <meta property="og:site_name" content="MIXR" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MIXR - AI Cocktail Recipe Generator" />
    <meta
      name="twitter:description"
      content="Discover and create cocktail recipes with AI-powered mixology. Generate unique drink recipes, browse community cocktails, and master the art of mixing."
    />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MIXR",
        "description": "Discover and create cocktail recipes with AI-powered mixology. Generate unique drink recipes, browse community cocktails, and master the art of mixing.",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "applicationCategory": "LifestyleApplication",
        "applicationSubCategory": "Recipe Generator",
        "operatingSystem": "Web",
        "inLanguage": ["en"],
        "datePublished": "2025-01-01",
        "dateModified": "2026-04-28",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "AI-powered cocktail recipe generation",
          "Mood-based drink recommendations",
          "Bar inventory tracking",
          "Community ratings and reviews",
          "Ingredient-based recipe search"
        ]
      }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "{{VITE_COMPANY_NAME}}",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "{{VITE_SUPPORT_EMAIL}}",
          "contactType": "customer support"
        }
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MIXR",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "inLanguage": ["en"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://{{VITE_APP_DOMAIN}}/recipes?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
